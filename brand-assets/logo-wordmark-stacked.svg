<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" width="280" height="48" role="img" aria-label="MainStreetBenchmark">
  <title>MainStreetBenchmark</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700&amp;display=swap');
      .wordmark-main { font-family: 'DM Sans', system-ui, sans-serif; font-weight: 600; font-size: 16px; fill: #1B2B4B; letter-spacing: -0.01em; }
      .wordmark-accent { font-family: 'DM Sans', system-ui, sans-serif; font-weight: 700; font-size: 16px; fill: #1E6B45; letter-spacing: -0.01em; }
    </style>
  </defs>
  <!-- Logo mark -->
  <rect width="48" height="48" rx="10" fill="#1B2B4B"/>
  <rect x="9" y="27" width="8" height="12" rx="1.5" fill="#FFFFFF" opacity="0.55"/>
  <rect x="20" y="19" width="8" height="20" rx="1.5" fill="#FFFFFF" opacity="0.8"/>
  <rect x="31" y="11" width="8" height="28" rx="1.5" fill="#1E6B45"/>
  <rect x="9" y="40" width="30" height="1.5" rx="0.75" fill="#FFFFFF" opacity="0.3"/>
  <!-- Wordmark — "MainStreet" in navy semibold, "Benchmark" in green bold -->
  <text x="60" y="20" class="wordmark-main">MainStreet</text>
  <text x="60" y="38" class="wordmark-accent">Benchmark</text>
</svg>
