<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 40" width="320" height="40" role="img" aria-label="MainStreetBenchmark">
  <title>MainStreetBenchmark</title>
  <!-- Mark scaled to 40px height for nav -->
  <rect width="40" height="40" rx="8" fill="#FFFFFF" opacity="0.12"/>
  <!-- Bars on transparent/dark background: white + green -->
  <rect x="7.5" y="22.5" width="6.5" height="10" rx="1.2" fill="#FFFFFF" opacity="0.55"/>
  <rect x="16.5" y="16" width="6.5" height="16.5" rx="1.2" fill="#FFFFFF" opacity="0.8"/>
  <rect x="25.5" y="9" width="6.5" height="23.5" rx="1.2" fill="#1E6B45"/>
  <rect x="7.5" y="33.5" width="25" height="1.2" rx="0.6" fill="#FFFFFF" opacity="0.3"/>
  <!-- Inline wordmark: MainStreet·Benchmark on one line, white text for dark nav -->
  <text x="50" y="26" font-family="'DM Sans', system-ui, sans-serif" font-weight="600" font-size="15" fill="#FFFFFF" letter-spacing="-0.01em">MainStreet</text>
  <text x="148" y="26" font-family="'DM Sans', system-ui, sans-serif" font-weight="700" font-size="15" fill="#1E6B45" letter-spacing="-0.01em">Benchmark</text>
</svg>
